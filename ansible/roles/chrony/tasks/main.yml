---
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true

- name: Deploy chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chronyd

- name: Set Chrony systemd service name
  ansible.builtin.set_fact:
    chrony_systemd_service_name: >-
      {{ 'chronyd' if ansible_facts.os_family in ['RedHat', 'Suse'] else 'chrony' }}

- name: Enable and start chronyd service
  ansible.builtin.systemd:
    name: "{{ chrony_systemd_service_name }}"
    enabled: true
    state: started

- name: Check if ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Allow UDP port 123 (NTP) through ufw
  community.general.ufw:
    rule: allow
    port: "123"
    proto: udp
  when: ufw_check.rc == 0
