---
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true

- name: Deploy chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chronyd

- name: Enable and start chronyd service
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started

- name: Check if ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Allow UDP port 123 (NTP) through ufw
  ansible.builtin.command: ufw allow 123/udp
  when: ufw_check.rc == 0
  changed_when: true
